name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version segment to increment"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    name: Resolve next release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.v-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        uses: reecetech/version-increment@2024.10.1
        with:
          scheme: semver
          increment: ${{ inputs.increment }}
          release_branch: ${{ github.ref_name }}

  build-toolchain:
    name: Build toolchain (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset-platform: linux
            asset-arch: x86_64
          - os: macos-latest
            asset-platform: darwin
            asset-arch: x86_64
          - os: windows-latest
            asset-platform: windows
            asset-arch: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install OCaml dependencies
        run: opam install . --deps-only --yes

      - name: Inject release version into build
        run: RIZZO_VERSION=${{ needs.prepare-release.outputs.version }} node ./scripts/write-build-version.mjs

      - name: Build compiler and language server
        run: opam exec -- dune build src/bin/main.exe src/bin/rizzolsp.exe

      - name: Package toolchain archive
        run: node ./scripts/package-toolchain.mjs --platform ${{ matrix.asset-platform
          }} --arch ${{ matrix.asset-arch }} --version ${{
          needs.prepare-release.outputs.version }}

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-${{ matrix.asset-platform }}-${{ matrix.asset-arch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt

  build-extension:
    name: Build VS Code extension
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode-rizzo-lsp/package-lock.json

      - name: Install extension dependencies
        working-directory: vscode-rizzo-lsp
        run: npm ci

      - name: Set extension release version
        working-directory: vscode-rizzo-lsp
        run: npm version ${{ needs.prepare-release.outputs.version }}
          --no-git-tag-version

      - name: Package VSIX
        working-directory: vscode-rizzo-lsp
        run: npm run package:vsix

      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: vscode-rizzo-lsp/out/*.vsix

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-toolchain
      - build-extension

    steps:
      - name: Download toolchain artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: toolchain-*

      - name: Combine checksum manifests
        shell: bash
        run: |
          find release-assets -name checksums.txt -type f -print0 \
            | xargs -0 cat \
            | sort -u > release-assets/checksums.txt

      - name: Download extension artifact
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          name: vscode-extension

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ needs.prepare-release.outputs.tag }}
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.vsix
            release-assets/checksums.txt
          generate_release_notes: true
